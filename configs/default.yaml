# Cấu hình huấn luyện cho luận văn Multimodal Negative Sampling
data:
  train_csv: "data/splits/train.csv"
  val_csv: "data/splits/val.csv"
  image_size: 256
  max_text_length: 128

model:
  embed_dim: 512
  image_encoder: "swinv2_base_window12to16_192to256"
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"
  temperature: 0.1

training:
  batch_size: 32             # <--- Giảm xuống 32 (16 ảnh / 1 GPU) để chống OOM
  gradient_accumulation_steps: 8  # <--- Tổng batch thực tế = 32 * 4 = 128
  epochs: 150
  lr: 0.00005                 # <--- Giảm xuống 5e-5 để học chậm và kỹ hơn
  warmup_epochs: 5            # <--- Kéo dài warmup lên 5 epoch để khởi đầu nhẹ nhàng
  backbone_lr_ratio: 10       # <--- Chia 10 cho Backbone để bảo vệ pre-trained weights
  weight_decay: 0.05          # <--- GIẢM MẠNH: 0.3 là quá cao, gây cản trở ranh giới quyết định
  num_workers: 4
  max_steps_per_epoch: null  # <--- Học hết toàn bộ tập dữ liệu mỗi epoch
  log_every_n_steps: 10
  checkpoint_dir: "checkpoints/"