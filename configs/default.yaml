# Cấu hình huấn luyện cho luận văn Multimodal Negative Sampling
data:
  train_csv: "data/splits/train.csv"
  val_csv: "data/splits/val.csv"
  image_size: 256
  max_text_length: 128

model:
  embed_dim: 512
  image_encoder: "swinv2_base_window12to16_192to256"
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"
  temperature: 0.07

training:
  batch_size: 8              # <--- Nạp 8 ảnh/lượt
  gradient_accumulation_steps: 16 # <--- Tổng batch thực tế = 8 * 16 = 128
  epochs: 100                  # <--- Huấn luyện lâu hơn để hội tụ tốt
  lr: 0.00002
  weight_decay: 0.05          # <--- Tăng nhẹ để tránh Overfitting
  num_workers: 4
  max_steps_per_epoch: null  # <--- Học hết toàn bộ tập dữ liệu mỗi epoch
  log_every_n_steps: 10
  checkpoint_dir: "checkpoints/"