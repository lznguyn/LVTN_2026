# Cấu hình huấn luyện cho luận văn Multimodal Negative Sampling
data:
  train_csv: "data/splits/train.csv"
  val_csv: "data/splits/val.csv"
  ext_eval_csv: "data/processed/mimic_dataset.csv"
  ext_eval_img_dir: ""
  image_size: 256
  max_text_length: 128

model:
  embed_dim: 512
  image_encoder: "swinv2_base_window12to16_192to256"
  text_encoder: "emilyalsentzer/Bio_ClinicalBERT"
  temperature: 0.1

training:
  batch_size: 32             # <--- Giảm xuống 32 (16 ảnh / 1 GPU) để chống OOM
  gradient_accumulation_steps: 8  # <--- Tổng batch thực tế = 32 * 4 = 128
  epochs: 100
  lr: 0.00003                 # <--- Giảm xuống 3e-5 (Trước đây 5e-5)
  warmup_epochs: 5
  backbone_lr_ratio: 10
  weight_decay: 0.1           # <--- Tăng lên 0.1 (Trước đây 0.05) để chống Overfitting
  num_workers: 4
  max_steps_per_epoch: null  # <--- Học hết toàn bộ tập dữ liệu mỗi epoch
  eval_every_n_epochs: 1      # <--- Tần suất đánh giá R@K (Ví dụ: 5 để chạy nhanh hơn)
  log_every_n_steps: 10
  checkpoint_dir: "checkpoints/"